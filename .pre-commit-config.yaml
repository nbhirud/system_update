# https://pre-commit.com/
# https://github.com/koalaman/shellcheck?tab=readme-ov-file#installing

repos:
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: [ "--severity=warning" ]  # Optionally only show errors and warnings



